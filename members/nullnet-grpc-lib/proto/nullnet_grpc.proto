syntax = "proto3";

package nullnet_grpc;

service NullnetGrpc {
  // TAP-based clients APIs --------------------------------------------------------------------------------------------

  // Network type declaration
  rpc NetworkType(Empty) returns (NetType);

  // Services list — response carries the trigger ports the caller should
  // observe locally for the services it just declared as hosting.
  rpc ServicesList(Services) returns (ServicesListResponse);

  // Control channel
  rpc ControlChannel(stream MsgId) returns (stream NetMessage);

  // Proxy-based clients APIs ------------------------------------------------------------------------------------------

  // Proxy
  rpc Proxy(ProxyRequest) returns (Upstream);

  // Backend-triggered chains APIs -------------------------------------------------------------------------------------

  // Backend trigger — for service-to-service chains that do not involve the proxy.
  rpc BackendTrigger(BackendTriggerRequest) returns (Empty);

  // Report an event from a client or proxy agent back to the server.
  rpc ReportEvent(AgentEvent) returns (Empty);

  // TLS certificate distribution APIs ---------------------------------------------------------------------------------

  // Long-lived stream: the server pushes the full certificate set immediately on
  // subscribe (proxy startup load) and again whenever it changes, so every proxy
  // hot-reloads without a restart.
  rpc WatchCertificates(Empty) returns (stream CertBundle);

  // Port mapping distribution APIs ---------------------------------------------------------------------------------

  // Long-lived stream: the server pushes the full TCP/UDP port→service mapping
  // table immediately on subscribe and again whenever services.toml changes,
  // so the proxy opens/closes raw TCP/UDP listeners without a restart.
  rpc WatchPortMappings(Empty) returns (stream PortMappingBundle);
}

// TAP-based clients ---------------------------------------------------------------------------------------------------

message NetType {
   Net net = 1;
}

enum Net {
  VXLAN = 0;
  VLAN = 1;
}

message NetMessage {
  oneof message {
    // VLAN setup and teardown
    VlanSetup vlan_setup = 1;
    VlanTeardown vlan_teardown = 2;
    // VXLAN setup and teardown
    VxlanSetup vxlan_setup = 3;
    VxlanTeardown vxlan_teardown = 4;
    // Docker container suspend (fire-and-forget) and resume (ack'd)
    ContainerSuspend container_suspend = 5;
    ContainerResume container_resume = 6;
  }
}

// Pause an idle Docker container: the client runs `docker pause`. No ack —
// the server treats the replica as suspended optimistically.
message ContainerSuspend {
  string docker_container = 1;
}

// Resume a suspended Docker container: the client runs `docker unpause`,
// confirms it is running, then acks via `msg_id` so the server only returns
// the upstream to the proxy once the service is serving again.
message ContainerResume {
  MsgId msg_id = 1;
  string docker_container = 2;
}

message VlanSetup {
  MsgId msg_id = 1;
  uint32 vlan_id = 2;
  string local_veth = 3;
  string remote_veth = 4;
  string local_ip = 5;
  string remote_ip = 6;
  optional HostMapping host_mapping = 7;
}

message VlanTeardown {
  uint32 vlan_id = 1;
}

message VxlanSetup {
  MsgId msg_id = 1;
  uint32 vxlan_id = 2;
  string ns_name = 3;
  string ns_net = 4;
  string br_name = 5;
  string br_net = 6;
  string local_ip = 7;
  string remote_ip = 8;
  optional HostMapping host_mapping = 9;
  optional string docker_container = 10;
  // Set only on the backend-entry edge of a backend-triggered chain.
  // The receiving client installs DNAT(dnat_port -> overlay_ip) so the
  // initiator's traffic on that local port is steered into the new VXLAN.
  optional uint32 dnat_port = 11;
}

message VxlanTeardown {
  uint32 vxlan_id = 1;
  string ns_name = 2;
  string br_name = 3;
  optional string docker_container = 4;
}

message MsgId {
  string id = 1;
}

message Services {
  repeated Service services = 1;
}

message Service {
  string name = 1;
  uint32 port = 2;
  optional string docker_container = 3;
  string stack = 4;
}

// Response to ServicesList: per-declared-service, the set of trigger ports
// the client should observe via eBPF. When traffic is observed on one of
// these ports, the client fires BackendTrigger(service_name, port).
message ServicesListResponse {
  repeated ServiceTrigger service_triggers = 1;
}

message ServiceTrigger {
  string service_name = 1;
  repeated uint32 ports = 2;
}

message HostMapping {
  string ip = 1;
  string name = 2;
}

// Proxy-based clients -------------------------------------------------------------------------------------------------

message ProxyRequest {
  string client_ip = 1;
  string service_name = 2;
}

message Upstream {
  string ip = 1;
  uint32 port = 2;
}

// Protocol a proxy-reachable service is exposed over. HTTP is routed by Host
// header on the shared 80/443 listeners; TCP/UDP each get a dedicated
// listen_port the proxy binds directly.
enum ServiceProtocol {
  HTTP = 0;
  TCP = 1;
  UDP = 2;
}

// One entry in the live port→service table. Only services with a non-HTTP
// protocol need an entry — HTTP stays on the existing Host-header routing.
message PortMapping {
  string service_name = 1;
  ServiceProtocol protocol = 2;
  uint32 listen_port = 3;
  // Mirrors the service's configured per-client idle timeout (0 disables
  // it), so the proxy can expire UDP sessions without a second timeout
  // mechanism.
  uint64 idle_timeout_secs = 4;
}

message PortMappingBundle {
  repeated PortMapping mappings = 1;
}

// Backend-triggered chains --------------------------------------------------------------------------------------------

message BackendTriggerRequest {
  string service_name = 1;
  // The trigger port observed by the client. Picks one chain among the
  // service's configured triggers (one chain per port).
  uint32 port = 2;
  // Real Docker container name of the initiator replica that fired the
  // trigger. Empty when the initiator is a host process (no docker context),
  // in which case the server falls back to picking the first replica matching
  // sender_ip. With docker, this disambiguates the replica when multiple
  // replicas of the same service live on the same host.
  string initiator_container = 3;
}

// TLS certificates ----------------------------------------------------------------------------------------------------

// A single TLS certificate, keyed by the SNI name it serves (exact, e.g.
// "color.com", or wildcard, e.g. "*.color.com").
message TlsCertificate {
  string domain = 1;
  // Leaf certificate followed by any intermediates, PEM-encoded.
  string fullchain_pem = 2;
  // PEM-encoded private key. Plaintext on the wire — protect this channel with
  // TLS (see gRPC-TLS TODO). At-rest encryption (CERT_ENCRYPTION_KEY,
  // AES-256-GCM) is applied server-side; the key is decrypted before it lands here.
  string key_pem = 3;
}

// The full certificate set. Sent in whole on every WatchCertificates push
// (the proxy rebuilds its store from the snapshot).
message CertBundle {
  repeated TlsCertificate certificates = 1;
}

// Misc ----------------------------------------------------------------------------------------------------------------

message Empty { }

// Agent event report — sent from nullnet-client or nullnet-proxy to the server.
message AgentEvent {
  oneof event {
    // Client error events
    AgentVxlanSetupFailed       vxlan_setup_failed       = 1;
    AgentVlanSetupFailed        vlan_setup_failed        = 2;
    AgentVxlanTeardownFailed    vxlan_teardown_failed    = 3;
    AgentVlanTeardownFailed     vlan_teardown_failed     = 4;
    AgentDnatInstallFailed      dnat_install_failed      = 5;
    AgentDnatRemovalFailed      dnat_removal_failed      = 6;
    AgentHostMappingFailed      host_mapping_failed      = 7;
    AgentControlChannelClosed   control_channel_closed   = 8;
    AgentControlChannelAckFailed control_channel_ack_failed = 9;
    AgentServicesListUpdateFailed services_list_update_failed = 10;
    AgentBackendTriggerSendFailed backend_trigger_send_failed = 11;
    AgentFirewallRulesLoadFailed  firewall_rules_load_failed  = 12;
    AgentContainerSuspendFailed   container_suspend_failed    = 24;
    AgentContainerResumeFailed    container_resume_failed     = 25;
    // Client info events
    AgentVxlanSetupCompleted      vxlan_setup_completed      = 13;
    AgentVlanSetupCompleted       vlan_setup_completed       = 14;
    AgentControlChannelEstablished control_channel_established = 15;
    AgentServicesListUpdated      services_list_updated      = 16;
    // Proxy error events
    AgentUpstreamLookupFailed     upstream_lookup_failed     = 17;
    AgentProxyRequestMissingHost  proxy_request_missing_host = 18;
    AgentProxyRequestInvalidHost  proxy_request_invalid_host = 19;
    AgentUpstreamIpParseFailed    upstream_ip_parse_failed   = 20;
    AgentProxyClientNotInet       proxy_client_not_inet      = 21;
    AgentTlsCertificateInvalid    tls_certificate_invalid    = 23;
    AgentTcpListenerBindFailed    tcp_listener_bind_failed   = 26;
    AgentUdpListenerBindFailed    udp_listener_bind_failed   = 27;
    AgentTcpUpstreamConnectFailed tcp_upstream_connect_failed = 28;
    AgentUdpUpstreamConnectFailed udp_upstream_connect_failed = 29;
    // Proxy info events
    AgentProxyRequestRouted       proxy_request_routed       = 22;
  }
}

message AgentVxlanSetupFailed       { uint32 vxlan_id = 1; string ns_name = 2; int32 error_code = 3; }
message AgentVlanSetupFailed        { uint32 vlan_id = 1; string local_veth = 2; string error_reason = 3; }
message AgentVxlanTeardownFailed    { uint32 vxlan_id = 1; string ns_name = 2; int32 error_code = 3; }
message AgentVlanTeardownFailed     { uint32 vlan_id = 1; string error_reason = 2; }
message AgentDnatInstallFailed      { uint32 port = 1; string overlay_ip = 2; }
message AgentDnatRemovalFailed      { uint32 port = 1; string overlay_ip = 2; }
message AgentHostMappingFailed      { string hostname = 1; string ip = 2; optional string docker_container = 3; }
message AgentControlChannelClosed   {}
message AgentControlChannelAckFailed { string msg_id = 1; string message_type = 2; }
message AgentServicesListUpdateFailed { string error_message = 1; uint32 num_services = 2; }
message AgentBackendTriggerSendFailed { string service_name = 1; uint32 port = 2; string error_message = 3; }
message AgentFirewallRulesLoadFailed  { string path = 1; string error_message = 2; }
message AgentContainerSuspendFailed  { string docker_container = 1; string error_message = 2; }
message AgentContainerResumeFailed   { string docker_container = 1; string error_message = 2; }
message AgentVxlanSetupCompleted    { uint32 vxlan_id = 1; string ns_name = 2; }
message AgentVlanSetupCompleted     { uint32 vlan_id = 1; }
message AgentControlChannelEstablished {}
message AgentServicesListUpdated    { uint32 num_services = 1; }
message AgentUpstreamLookupFailed   { string service_name = 1; string client_ip = 2; string error_message = 3; }
message AgentProxyRequestMissingHost { string client_ip = 1; }
message AgentProxyRequestInvalidHost { string client_ip = 1; }
message AgentUpstreamIpParseFailed  { string raw_ip = 1; string service_name = 2; }
message AgentProxyClientNotInet     { string address_family = 1; }
message AgentTlsCertificateInvalid  { string domain = 1; string reason = 2; }
message AgentProxyRequestRouted     { string service_name = 1; string client_ip = 2; string upstream_ip = 3; uint64 latency_ms = 4; }
message AgentTcpListenerBindFailed  { uint32 listen_port = 1; string service_name = 2; string error_message = 3; }
message AgentUdpListenerBindFailed  { uint32 listen_port = 1; string service_name = 2; string error_message = 3; }
message AgentTcpUpstreamConnectFailed { string service_name = 1; string client_ip = 2; string error_message = 3; }
message AgentUdpUpstreamConnectFailed { string service_name = 1; string client_ip = 2; string error_message = 3; }